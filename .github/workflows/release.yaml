name: Release

on: 
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
      # Job 1 build binary and create github releaae
  build-and-release:
    name:  Build Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependecies
        run: bun install
      - name: Build Linux binary
    # build binary for multi platform
        run: |
             mkdir -p bin
            
             bun build src/index.ts \
             --compile \
             --target=bun-linux-x64 \
             --outfile bin/llm-linux-amd64

             bun build src/index.ts \
             --compile \
             --target=bun-linux-arm64 \
             --outfile bin/llm-linux-arm64

             bun build src/index.ts \
             --compile \
             --target=bun-darwin-arm64 \
             --outfile bin/llm-mac-apple-silicon

             bun build src/index.ts \
             --compile \
             --target=bun-darwin-x64 \
             --outfile bin/llm-mac-intel
             
             bun build src/index.ts \
             --compile \
             --target=bun-windows-x64 \
             --outfile bin/llm-windows.exe

      - name: Make binary executable
        run: |
         chmod +x bin/llm-linux-amd64 
         chmod +x bin/llm-linux-arm64
         chmod +x bin/llm-mac-intel
         chmod +x bin/llm-mac-apple-silicon

      - name: Create Github Release + attach binary
        uses:  softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
            files: |
             bin/llm-linux-amd64
              bin/llm-linux-arm64
             bin/llm-mac-intel
             bin/llm-mac-apple-silicon
             bin/llm-windows.exe
             install.sh
            body_path: RELEASE_NOTES.md 
            generate_release_notes: false

            
  #  Job 2: Buil and push Docker image  
  docker: 
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout code 
        uses:  actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}} 
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name:  Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            thissidemayur/llm-cli:latest
            thissidemayur/llm-cli:${{github.ref_name}}